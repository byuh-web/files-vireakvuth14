<!DOCTYPE html>
<html>

<head>
    <title>Contact</title>
    <meta name="description" content="Contact page">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stylecam.css">
</head>

<body>
    <header>
        <h1>Contact Us</h1>
    </header>

    <nav>
        <a href="homepages.html">Home</a>
        <a href="history.html">History</a>
        <a href="food.html">Food</a>
        <a href="places.html">Places</a>
        <a href="facts.html">Facts</a>
        <a href="contact.html" class="active">Contact</a>
    </nav>

    <h2>Cambodia Travel Survey</h2>

    <figure class="photo-card">
        <div class="container">
            <form>

                <div class="form-row">
                    <label>First Name: </label>
                    <input type="text" required placeholder="Enter your first name">
                </div>

                <div class="form-row">
                    <label>Last Name:</label>
                    <input type="text" required placeholder="Enter your last name">
                </div>

                <div class="form-row">
                    <label>Email:</label>
                    <input type="email" required placeholder="you@example.com">
                </div>

                <div class="form-row">
                    <label>Phone Number:</label>
                    <input type="text" required placeholder="Any phone number">
                </div>

                <div class="form-row">
                    <label>Country:</label>
                    <input type="text" placeholder="Your country">
                </div>

                <div class="form-row">
                    <label>Favorite Place:</label>
                    <input type="text" placeholder="Favorite part of the trip">
                </div>

                <div class="form-row">
                    <label>Message:</label>
                    <textarea placeholder="Write a short description..."></textarea>
                </div>

                <div class="form-submit">
                    <input type="submit" value="submit">
                </div>

            </form>
        </div>
    </figure>


    <footer>
        <p>&copy; 2026 Cambodia</p>
    </footer>
</body>

</html>
